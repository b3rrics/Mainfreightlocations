<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Area Code Directory</title>

<style>
body {
    font-family: Arial, sans-serif;
    max-width: 800px;
    margin: 20px auto;
}

input {
    width: 100%;
    padding: 10px;
    font-size: 16px;
}

.result {
    border: 1px solid #ddd;
    padding: 10px;
    margin-top: 10px;
}
</style>
</head>

<body>

<h1>Area Code Directory</h1>

<input id="search" placeholder="Search business or address">

<div id="results"></div>

<script>

let data = [];

fetch("data.json")
    .then(r => r.json())
    .then(json => {
        data = json;
    });

document.getElementById("search")
.addEventListener("input", function() {

    const q = this.value.toLowerCase();

    const matches = data.filter(item =>
        item.business.toLowerCase().includes(q) ||
        item.address.toLowerCase().includes(q)
    );

    document.getElementById("results").innerHTML =
        matches.map(item => `
            <div class="result">
                <strong>Code:</strong> ${item.code}<br>
                <strong>Business:</strong> ${item.business || "(none)"}<br>
                <strong>Address:</strong> ${item.address}
            </div>
        `).join("");
});
</script>

</body>
</html>
