<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mainfreight Locations</title>

<style>
body{
    font-family: Arial, sans-serif;
    max-width: 900px;
    margin: auto;
    padding: 20px;
}

h1{
    text-align:center;
}

#search{
    width:100%;
    padding:12px;
    font-size:18px;
    box-sizing:border-box;
.header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 20px;
    margin-bottom: 20px;
    flex-wrap: wrap;
}

.title-section h1 {
    margin: 0;
}

.subtitle {
    margin-top: 5px;
    color: #666;
    font-size: 14px;
}

.button-group {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
}

.action-btn {
    background: #0066cc;
    color: white;
    text-decoration: none;
    padding: 10px 14px;
    border-radius: 8px;
    font-weight: bold;
    white-space: nowrap;
}

.action-btn:hover {
    opacity: 0.9;
}

.action-btn.secondary {
    background: #666;
}

@media (max-width: 700px) {

    .header {
        flex-direction: column;
        align-items: stretch;
    }

    .button-group {
        width: 100%;
    }

    .action-btn {
        text-align: center;
        flex: 1;
    }
}
}

#status{
    margin-top:10px;
    color:#666;
}

.result{
    border:1px solid #ddd;
    border-radius:8px;
    padding:12px;
    margin-top:10px;
}

.code{
    font-size:22px;
    font-weight:bold;

}
</style>
</head>
<body>

<div class="header">

    <div class="title-section">
        <h1>Area Code Directory</h1>
        <p class="subtitle">
            Search by address or business name to find the area code.
        </p>
    </div>

    <div class="button-group">

        <a
            href="https://docs.google.com/forms/d/e/1FAIpQLSe1MLz0yzOSOzVuJEavsqz7nAF37duz6eJ6nBia16YR_cdJQg/viewform?usp=publish-editor"
            target="_blank"
            class="action-btn">
            Suggest a Location
        </a>

        <a
            href="https://docs.google.com/forms/d/e/1FAIpQLSeTj30njPH5gdWFuIe1-0kx4wWdhvdjQBFR_6Ub8o_xWJ45Yg/viewform?usp=dialog"
            target="_blank"
            class="action-btn secondary">
            Report an Error
        </a>

    </div>

</div>

<input
    type="text"
    id="search"
    placeholder="Search code, business, or address..."
>

<div id="status">Loading data...</div>

<div id="results"></div>

<script>

let data = [];

function parseCSV(text){

    const lines = text.trim().split(/\r?\n/);

    const rows = [];

    for(let i = 1; i < lines.length; i++){

        const cols = lines[i].split(",");

        rows.push({
            code: cols[0] ? cols[0].trim() : "",
            address: cols[1] ? cols[1].trim() : "",
            business: cols[2] ? cols[2].trim() : ""
        });
    }

    return rows;
}

function render(searchText = ""){

    const q = searchText.toLowerCase();

    const matches = data.filter(item =>
        item.code.toLowerCase().includes(q) ||
        item.business.toLowerCase().includes(q) ||
        item.address.toLowerCase().includes(q)
    );

    document.getElementById("status").textContent =
        `${matches.length} result(s)`;

    const html = matches.map(item => `
        <div class="result">
            <div class="code">${item.code}</div>
            <div><strong>Business:</strong> ${item.business || "(none)"}</div>
            <div><strong>Address:</strong> ${item.address}</div>
        </div>
    `).join("");

    document.getElementById("results").innerHTML = html;
}

fetch("data.csv")
    .then(response => response.text())
    .then(csv => {

        data = parseCSV(csv);

        document
            .getElementById("search")
            .addEventListener("input", function(){
                render(this.value);
            });

        render();
    })
    .catch(error => {
        document.getElementById("status").textContent =
            "Could not load data.csv";
        console.error(error);
    });

</script>

</body>
</html>
